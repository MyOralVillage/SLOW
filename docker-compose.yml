services:
  postgres:
    image: postgres:16
    container_name: slow_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=slow_oim
      - POSTGRES_USER=slow
      - POSTGRES_PASSWORD=slow_password
    ports:
      - "5433:5432"
    volumes:
      - slow_postgres_data:/var/lib/postgresql/data

  oim_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slow_oim_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://slow:slow_password@postgres:5432/slow_oim?schema=public
      - PORT=3001
      - API_KEY=${OIM_API_KEY:-change-me}
      - OWNER_EMAILS=${OIM_OWNER_EMAILS:-brett@example.com}
      - ADMIN_EMAILS=${OIM_ADMIN_EMAILS:-brett@example.com}
      - SESSION_TTL_DAYS=${OIM_SESSION_TTL_DAYS:-14}
      - UPLOAD_DIR=/data/uploads
      - CORS_ORIGIN=${OIM_CORS_ORIGIN:-http://127.0.0.1:8080}
    ports:
      - "3001:3001"
    volumes:
      - slow_uploads:/data/uploads

  bookstack_db:
    image: mariadb:11.4
    container_name: slow_bookstack_db
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=root_password
      - MARIADB_DATABASE=bookstack
      - MARIADB_USER=bookstack
      - MARIADB_PASSWORD=bookstack_password
    volumes:
      - bookstack_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: slow_bookstack
    restart: unless-stopped
    depends_on:
      bookstack_db:
        condition: service_healthy
    ports:
      - "6875:80"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Vancouver
      - APP_URL=${APP_URL}
      - APP_KEY=${APP_KEY}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - bookstack_data:/config

volumes:
  slow_postgres_data:
  slow_uploads:
  bookstack_data:
  bookstack_db_data:
